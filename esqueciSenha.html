<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="tema.css">
    <link rel="stylesheet" href="esqueciSenha.css">
   
</head>
<body>
    <body class="bg-organiza">

        <main class="container min-vh-100 d-flex justify-content-center align-items-center py-4">
        
          <div class="card p-4 shadow-sm perfil-card">
        
            <div class="text-center mb-3">
              <h2 class="logo m-0">ORGANIZA</h2>
              <div class="plus">+</div>
              <p class="small text-muted mb-0">Recuperação de Senha</p>
            </div>
            <div class="tema-switch">
              <input type="checkbox" id="temaToggle" class="tema-switch__input">
              <label for="temaToggle" class="tema-switch__label">
                <span>☀</span>
                <span>🌙</span>
                <span class="tema-switch__thumb"></span>
              </label>
            </div>
            <form id="Senha"></form>
 
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control bg-box" placeholder="E-mail" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label">Criar Nova Senha</label>
                <input type="Sen" id="Senha" class="form-control bg-box" placeholder="Senha" disabled>
              </div>
            
              <div class="mb-3">
                <label class="form-label">Confirmar Senha</label>
                <input type="Conf" id="confirmar Senha" class="form-control bg-box" placeholder="Senha" disabled>
              </div>

              <div class="d-flex gap-3 justify-content-center flex-wrap">
                <button type="submit" class="btn btn-primary px-4">Confirmar</button>
                <a href="login.html" class="btn btn-warning px-4">Sair</a>
              </div>

           
        <p class="text-center mt-4 small text-muted">@produzido por Silvia Borges 2026</p>
        </main>


<script src="esqueciSenha.js"></script>
</body>
</html>
