<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | Organiza+</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="tema.css">
  <link rel="stylesheet" href="perfil.css">
</head>
<body class="bg-organiza">

<main class="container min-vh-100 d-flex justify-content-center align-items-center py-4">

  <div class="card p-4 shadow-sm perfil-card">

    <div class="text-center mb-3">
      <h2 class="logo m-0">ORGANIZA</h2>
      <div class="plus">+</div>
      <p class="small text-muted mb-0">Cadastro / Perfil</p>
    </div>
    <div class="tema-switch">
      <input type="checkbox" id="temaToggle" class="tema-switch__input">
      <label for="temaToggle" class="tema-switch__label">
        <span>☀</span>
        <span>🌙</span>
        <span class="tema-switch__thumb"></span>
      </label>
    </div>

    <form id="formPerfil">

      <div class="mb-3">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="nome" class="form-control bg-box" placeholder="Nome Completo" disabled>
      </div>

      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control bg-box" placeholder="E-mail" disabled>
      </div>

      <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input type="tel" id="telefone" class="form-control bg-box" placeholder="Telefone" disabled>
      </div>

      <div class="d-grid mb-3">
        <button type="button" id="btnEditar" class="btn btn-outline-secondary">
          Editar perfil
        </button>
      </div>

      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <button type="submit" class="btn btn-primary px-4">Confirmar</button>
        <a href="login.html" class="btn btn-warning px-4">Sair</a>
      </div>

      <p id="msg" class="text-center small mt-3 mb-0"></p>

    </form>

    <p class="text-center small text-muted mt-4 mb-0">@produzido por Silvia Borges 2026</p>

  </div>

</main>
<script src="tema.js"></script>
<script src="perfil.js"></script>
</body>
</html>
