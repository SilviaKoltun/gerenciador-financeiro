<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organiza+ | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="tema.css">
  <link rel="stylesheet" href="login.css">
</head>

<body class="bg-organiza">

  <main class="container min-vh-100 d-flex justify-content-center align-items-center position-relative">

    <div class="tema-switch">
      <input type="checkbox" id="temaToggle" class="tema-switch__input">
      <label for="temaToggle" class="tema-switch__label">
        <span>☀</span>
        <span>🌙</span>
        <span class="tema-switch__thumb"></span>
      </label>
    </div>

    <div class="card p-4 shadow-sm login-card">

      <h2 class="text-center fw-bold">Seja Bem Vindo!</h2>

      <div class="text-center my-3">
        <h3 class="logo">ORGANIZA</h3>
        <span class="plus">+</span>
      </div>

      <form id="formLogin">

        <div class="mb-3">
          <label class="form-label">Login</label>
          <input type="text" id="login" class="form-control bg-box">
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="senha" class="form-control bg-box">
        </div>

        <div class="d-grid mb-3">
          <button class="btn btn-primary btn-lg" type="submit">Entrar</button>
        </div>

        <p id="msg" class="text-danger small text-center"></p>

        <div class="text-center small d-flex flex-column gap-2">
          <a href="perfil.html" id="linkCadastro">Primeiro acesso - Fazer cadastro</a>
          <a href="esqueciSenha.html" id="linkEsqueci">Esqueci minha senha</a>
        </div>

      </form>

    </div>
  </main>

  <script src="login.js"></script>
  <script src="tema.js"></script>
</body>
</html>
