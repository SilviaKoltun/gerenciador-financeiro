<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organiza+ | Editar Recorrência</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="tema.css">
</head>
<body class="bg-organiza">

  <main class="container py-4" style="max-width: 680px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="fst-italic fw-normal m-0">EDITAR RECORRÊNCIA</h1>
      <a class="btn btn-outline-secondary btn-sm" href="recorrencias.html">← Voltar</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form id="formRecorrencia">
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <input type="text" class="form-control" id="descricao">
          </div>

          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">Valor</label>
              <input type="number" class="form-control" id="valor" step="0.01" min="0">
            </div>

            <div class="col-md-6">
              <label class="form-label">Categoria</label>
              <select class="form-select" id="categoria">
                <option value="">Selecione...</option>
                <option>Alimentação</option>
                <option>Moradia</option>
                <option>Transporte</option>
                <option>Saúde</option>
                <option>Educação</option>
                <option>Lazer</option>
                <option>Contas</option>
                <option>Outros</option>
              </select>
            </div>
          </div>

          <div class="row g-2 mt-1">
            <div class="col-md-6">
              <label class="form-label">Forma de pagamento</label>
              <select class="form-select" id="pagamento">
                <option value="">Selecione...</option>
                <option value="Pix">Pix</option>
                <option value="Crédito">Cartão de crédito</option>
                <option value="Débito">Cartão de débito</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Vencimento base</label>
              <input type="date" class="form-control" id="vencimento">
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary" type="submit">Salvar alterações</button>
            <a class="btn btn-outline-secondary" href="recorrencias.html">Cancelar</a>
          </div>

          <p id="msg" class="small text-center mt-3 mb-0"></p>
        </form>
      </div>
    </div>
  </main>

  <script src="editar-recorrencia.js"></script>
</body>
</html>
