<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organiza+ | Despesa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="despesa.css">
  <link rel="stylesheet" href="tema.css">
</head>
<body class="bg-organiza">

  <main class="container py-4" style="max-width: 680px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="fst-italic fw-normal m-0" id="tituloPagina">DESPESA</h1>
      <a class="btn btn-outline-secondary btn-sm" href="index.html">← Voltar</a>
    </div>

    <div class="tema-switch">
      <input type="checkbox" id="temaToggle" class="tema-switch__input">
      <label for="temaToggle" class="tema-switch__label">
        <span>☀</span>
        <span>🌙</span>
        <span class="tema-switch__thumb"></span>
      </label>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form id="formDespesa">

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <input
              type="text"
              class="form-control bg-box border-0"
              id="descricao"
              placeholder="Ex: Mercado, conta de luz..."
            />
          </div>

          <div class="row g-2">
            <div class="col-12 col-md-6">
              <label class="form-label">Valor (R$)</label>
              <input
                type="number"
                class="form-control bg-box border-0"
                id="valor"
                step="0.01"
                min="0"
                placeholder="Ex: 120.50"
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Categoria</label>
              <select class="form-select bg-box border-0" id="categoria">
                <option value="">Selecione...</option>
                <option>Alimentação</option>
                <option>Moradia</option>
                <option>Transporte</option>
                <option>Saúde</option>
                <option>Educação</option>
                <option>Lazer</option>
                <option>Contas</option>
                <option>Outros</option>
              </select>
            </div>
          </div>

          <div class="row g-2 mt-1">
            <div class="col-12 col-md-6">
              <label class="form-label">Forma de pagamento</label>
              <select class="form-select bg-box border-0" id="pagamento">
                <option value="">Selecione...</option>
                <option value="Pix">Pix</option>
                <option value="Crédito">Cartão de crédito</option>
                <option value="Débito">Cartão de débito</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Data do lançamento</label>
              <input type="date" class="form-control bg-box border-0" id="data" />
            </div>
          </div>

          <div class="row g-2 mt-1">
            <div class="col-12 col-md-6">
              <label class="form-label">Vencimento</label>
              <input type="date" class="form-control bg-box border-0" id="vencimento" />
            </div>
          </div>

          <div class="row g-2 mt-1">
            <div class="col-12 col-md-6">
              <label class="form-label">Recorrente</label>
              <select class="form-select bg-box border-0" id="Recorrente">
                <option value="">Selecione...</option>
                <option value="Sim">Sim</option>
                <option value="Nao">Não</option>
            </div>
          </div>

          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="pago">
            <label class="form-check-label" for="pago">Já foi pago</label>
          </div>

          <div class="d-flex gap-2 flex-wrap mt-3">
            <button class="btn btn-danger px-4" type="submit" id="btnSalvar">Salvar</button>
            <button class="btn btn-outline-secondary" id="btnLimpar" type="button">Limpar</button>
            <a class="btn btn-warning ms-auto" href="financeiro.html">Ir para Financeiro</a>
          </div>

          <p id="msg" class="small text-center mt-3 mb-0"></p>
        </form>
      </div>
    </div>

    <p class="text-center mt-4 small text-muted">@produzido por Silvia Borges 2026</p>
  </main>

  <script src="tema.js"></script>
  <script src="despesa.js"></script>
</body>
</html>
